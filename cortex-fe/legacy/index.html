<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cortex — hotspot debug</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    background: #1a1a1a;
    color: #eee;
    padding: 24px;
    min-height: 100vh;
  }
  h1 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 14px;
    opacity: 0.6;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .toolbar {
    display: flex;
    gap: 22px;
    padding: 12px 18px;
    background: #262626;
    border-radius: 8px;
    margin-bottom: 18px;
    font-size: 13px;
    flex-wrap: wrap;
  }
  .toolbar label {
    cursor: pointer;
    user-select: none;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .toolbar input { cursor: pointer; }
  .toolbar .sep {
    width: 1px;
    background: #444;
    margin: 0 4px;
  }
  .toolbar .legend {
    display: flex;
    gap: 14px;
    margin-left: auto;
    font-size: 12px;
    opacity: 0.8;
    flex-wrap: wrap;
  }
  .toolbar .legend span {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .toolbar .swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    display: inline-block;
  }

  .stage {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 18px;
    align-items: start;
  }
  @media (max-width: 1100px) {
    .stage { grid-template-columns: 1fr; }
  }

  .container {
    position: relative;
    display: block;
    width: 100%;
    max-width: 100%;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    background: #f4ecd9;
    line-height: 0;
  }
  .container img {
    display: block;
    width: 100%;
    height: auto;
  }
  .overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .hotspot {
    position: absolute;
    border: 2px solid;
    border-radius: 4px;
    cursor: pointer;
    pointer-events: auto;
    transition:
      background 0.15s,
      box-shadow 0.18s,
      transform 0.15s;
    background: transparent;
  }
  .hotspot:hover,
  .hotspot.active {
    background: rgba(255,255,255,0.18);
    box-shadow:
      0 0 0 3px currentColor,
      0 0 28px currentColor;
    transform: scale(1.005);
    z-index: 10;
  }
  .hide-bbox .hotspot {
    border-color: transparent;
  }
  .hide-bbox .hotspot:hover,
  .hide-bbox .hotspot.active {
    background: rgba(255,255,255,0.10);
    box-shadow: 0 0 28px currentColor;
  }
  .hotspot-label {
    position: absolute;
    bottom: 100%;
    left: -2px;
    padding: 3px 8px;
    font-size: 10.5px;
    font-weight: 700;
    color: #1a1a1a;
    border-radius: 3px 3px 0 0;
    white-space: nowrap;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    background: currentColor;
  }
  .hotspot-label span { color: #1a1a1a; }
  .hide-labels .hotspot-label { display: none; }

  .center-dot {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid #fff;
    transform: translate(-50%, -50%);
    pointer-events: none;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.6), 0 0 8px rgba(0,0,0,0.3);
    z-index: 11;
  }
  .hide-center .center-dot { display: none; }

  .info {
    padding: 18px 20px;
    background: #262626;
    border-radius: 10px;
    border-left: 4px solid #555;
    font-size: 13.5px;
    line-height: 1.55;
    transition: border-color 0.2s;
    position: sticky;
    top: 24px;
  }
  .info .id {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    opacity: 0.5;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .info .label {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .info .desc {
    margin-bottom: 14px;
    opacity: 0.85;
  }
  .info .meta {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11.5px;
    opacity: 0.55;
    line-height: 1.7;
  }
  .info.empty .label { opacity: 0.4; }
  .info.empty .desc { opacity: 0.5; font-style: italic; }
</style>
</head>
<body>

<h1>Cortex — Auth Service hotspot debug</h1>

<div class="toolbar">
  <label><input type="checkbox" checked id="show-bbox"> Bounding boxes</label>
  <label><input type="checkbox" checked id="show-labels"> Labels</label>
  <label><input type="checkbox" checked id="show-center"> Center points</label>
  <span class="sep"></span>
  <label><input type="checkbox" id="dim-image"> Dim image (focus hotspots)</label>
  <div class="legend" id="legend"></div>
</div>

<div class="stage">
  <div class="container" id="stage">
    <img src="auth_service.png" alt="Auth Service scene" id="bg">
    <div class="overlay" id="overlay"></div>
  </div>

  <div class="info empty" id="info">
    <div class="id">no selection</div>
    <div class="label">Hover or click a hotspot</div>
    <div class="desc">The bounding boxes are scaled responsively from the original image dimensions (1448 × 1086 px).</div>
    <div class="meta">Image: 1448 × 1086 px<br>Hotspots: 5</div>
  </div>
</div>

<script>
const IMAGE_W = 1270;
const IMAGE_H = 952;

const HOTSPOTS = [
  {
    id: "auth_service",
    label: "Auth Service",
    desc: "The main service. Handles login, issues tokens, logs events. The scribe inside is the worker that processes each request.",
    bbox: { x: 248, y: 58, w: 572, h: 500 },
    center: { x: 534, y: 308 },
    confidence: 0.97,
    color: "#D4A24A"
  },
  {
    id: "redis_cache",
    label: "Redis Cache",
    desc: "The cylindrical silo. Caches the morning login peak so the auth service doesn't hammer the DB. Pipe = network call.",
    bbox: { x: 812, y: 192, w: 294, h: 366 },
    center: { x: 959, y: 375 },
    confidence: 0.98,
    color: "#A8C4B0"
  },
  {
    id: "database",
    label: "Database",
    desc: "The stone well. Persistent user store — slower, deeper, source of truth.",
    bbox: { x: 428, y: 618, w: 268, h: 236 },
    center: { x: 562, y: 736 },
    confidence: 0.97,
    color: "#9FB7C9"
  },
  {
    id: "request",
    label: "Request",
    desc: "An incoming login request, walking up the steps with credentials in hand.",
    bbox: { x: 62, y: 262, w: 152, h: 232 },
    center: { x: 138, y: 378 },
    confidence: 0.96,
    color: "#C97B5C"
  },
  {
    id: "verification_list",
    label: "Verification list",
    desc: "The procedure pinned to the wall: 1) verify, 2) issue token, 3) log event.",
    bbox: { x: 382, y: 212, w: 134, h: 118 },
    center: { x: 449, y: 271 },
    confidence: 0.94,
    color: "#6B6B6B"
  }
];

const overlay = document.getElementById('overlay');
const info    = document.getElementById('info');
const stage   = document.getElementById('stage');
const legend  = document.getElementById('legend');

function pct(part, whole) { return (part / whole) * 100; }

function renderHotspots() {
  overlay.innerHTML = '';
  HOTSPOTS.forEach(h => {
    const el = document.createElement('div');
    el.className = 'hotspot';
    el.dataset.id = h.id;
    el.style.left   = pct(h.bbox.x, IMAGE_W) + '%';
    el.style.top    = pct(h.bbox.y, IMAGE_H) + '%';
    el.style.width  = pct(h.bbox.w, IMAGE_W) + '%';
    el.style.height = pct(h.bbox.h, IMAGE_H) + '%';
    el.style.color  = h.color;

    const label = document.createElement('div');
    label.className = 'hotspot-label';
    label.style.background = h.color;
    label.innerHTML = '<span>' + h.label + '</span>';
    el.appendChild(label);

    const dot = document.createElement('div');
    dot.className = 'center-dot';
    dot.style.left = pct(h.center.x, IMAGE_W) + '%';
    dot.style.top  = pct(h.center.y, IMAGE_H) + '%';
    dot.style.background = h.color;

    el.addEventListener('mouseenter', () => showInfo(h));
    el.addEventListener('mouseleave', () => { if (!stickyId) clearInfo(); });
    el.addEventListener('click', () => {
      if (stickyId === h.id) {
        stickyId = null;
        el.classList.remove('active');
        clearInfo();
      } else {
        document.querySelectorAll('.hotspot.active').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        stickyId = h.id;
        showInfo(h, true);
      }
    });

    overlay.appendChild(el);
    overlay.appendChild(dot);
  });
}

let stickyId = null;

function showInfo(h, sticky = false) {
  info.classList.remove('empty');
  info.style.borderLeftColor = h.color;
  info.innerHTML = `
    <div class="id">${h.id}${sticky ? ' · pinned' : ''}</div>
    <div class="label">${h.label}</div>
    <div class="desc">${h.desc}</div>
    <div class="meta">
      bbox: ${h.bbox.x}, ${h.bbox.y}, ${h.bbox.w} × ${h.bbox.h}<br>
      center: ${h.center.x}, ${h.center.y}<br>
      confidence: ${h.confidence}
    </div>
  `;
}

function clearInfo() {
  info.classList.add('empty');
  info.style.borderLeftColor = '#555';
  info.innerHTML = `
    <div class="id">no selection</div>
    <div class="label">Hover or click a hotspot</div>
    <div class="desc">Click pins the panel. Click again to unpin.</div>
    <div class="meta">Image: ${IMAGE_W} × ${IMAGE_H} px<br>Hotspots: ${HOTSPOTS.length}</div>
  `;
}

function renderLegend() {
  legend.innerHTML = HOTSPOTS.map(h =>
    `<span><i class="swatch" style="background:${h.color}"></i>${h.label}</span>`
  ).join('');
}

document.getElementById('show-bbox').addEventListener('change', e => {
  stage.classList.toggle('hide-bbox', !e.target.checked);
});
document.getElementById('show-labels').addEventListener('change', e => {
  stage.classList.toggle('hide-labels', !e.target.checked);
});
document.getElementById('show-center').addEventListener('change', e => {
  stage.classList.toggle('hide-center', !e.target.checked);
});
document.getElementById('dim-image').addEventListener('change', e => {
  document.getElementById('bg').style.filter = e.target.checked
    ? 'brightness(0.55) saturate(0.7)'
    : 'none';
});

renderHotspots();
renderLegend();
clearInfo();
</script>

</body>
</html>
